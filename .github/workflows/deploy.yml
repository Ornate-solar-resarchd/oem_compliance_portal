name: Deploy Compliance Portal

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-compliance
  cancel-in-progress: false

jobs:
  deploy:
    uses: Ornate-solar-resarchd/portals-infra/.github/workflows/_deploy-template.yml@main
    with:
      portal:       compliance
      portal_dir:   oem_compliance_portal
      services:     "compliance-backend compliance-frontend"
      health_url:   "https://compliance.unityess.cloud/"
      runner_label: compliance
